name: Governance Lint

on:
  workflow_call:
    inputs:
      readme-type:
        description: >
          README heading validation profile: "library", "application", or ""
          (empty string skips validation). Default is "" for backward compat.
        required: false
        type: string
        default: ""

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Vale prose linter
        if: hashFiles('.vale.ini') != ''
        uses: vale-cli/vale-action@v2
        with:
          fail_on_error: true

      - uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            **/SPEC.md
            **/ROADMAP.md
            **/README.md
            **/REQUIREMENTS.md
            **/CHANGELOG.md

      - name: Validate SPEC.md status lines
        run: |
          errors=0
          for specfile in $(find . -name 'SPEC.md' -not -path './.git/*' | sort); do
            echo "Checking $specfile"
            section=""
            expect_status=false

            while IFS= read -r line; do
              if [[ "$line" =~ ^##\ [^#] ]]; then
                if $expect_status; then
                  echo "::error file=${specfile}::Section '$section' has no *Status: line"
                  errors=$((errors + 1))
                fi
                section="$line"
                expect_status=true
                continue
              fi

              if $expect_status; then
                if [[ -z "$line" ]]; then
                  continue
                fi

                if [[ "$line" =~ ^\*Status:\ (not\ started|in\ progress|complete)\*$ ]]; then
                  expect_status=false
                else
                  echo "::error file=${specfile}::Section '$section' has invalid or missing status line: $line"
                  errors=$((errors + 1))
                  expect_status=false
                fi
              fi
            done < <(tr -d '\r' < "$specfile")

            if $expect_status; then
              echo "::error file=${specfile}::Section '$section' has no *Status: line (end of file)"
              errors=$((errors + 1))
            fi
          done

          if [ "$errors" -gt 0 ]; then
            echo "$errors status-line error(s) found"
            exit 1
          fi

          echo "All SPEC.md files have valid status lines"

      - name: Validate README.md headings
        if: inputs.readme-type != ''
        run: |
          if [ ! -f README.md ]; then
            echo "::error::README.md not found"
            exit 1
          fi

          readme_type="${{ inputs.readme-type }}"
          errors=0

          headings=$(grep -E '^## ' README.md | sed 's/^## //' | tr '[:upper:]' '[:lower:]')

          check_heading() {
            local label="$1"
            local pattern="$2"
            if ! echo "$headings" | grep -qxE "$pattern"; then
              echo "::error::README.md missing required heading: $label (expected pattern: $pattern)"
              errors=$((errors + 1))
            fi
          }

          check_heading "License" "licen(se|sing)|licensing note"

          case "$readme_type" in
            library)
              check_heading "Installation" "install(ation)?|getting started|quick start"
              check_heading "Usage" "usage"
              check_heading "API" "api|api reference"
              ;;
            application)
              check_heading "Getting Started" "quick start|getting started|install(ation)?"
              check_heading "Usage" "usage"
              ;;
            *)
              echo "::error::Unknown readme-type: $readme_type (expected 'library' or 'application')"
              exit 1
              ;;
          esac

          if [ "$errors" -gt 0 ]; then
            echo "$errors README heading error(s) found"
            exit 1
          fi

          echo "All required README headings present for type '$readme_type'"

      - name: Validate SPEC.md heading slugs
        run: |
          errors=0
          for specfile in $(find . -name 'SPEC.md' -not -path './.git/*' | sort); do
            echo "Checking $specfile"
            while IFS= read -r line; do
              if ! echo "$line" | grep -qE '§spec:[a-z0-9-]+'; then
                echo "::error file=${specfile}::Heading missing §spec: slug: $line"
                errors=$((errors + 1))
              fi
            done < <(grep -E '^## ' "$specfile" | tr -d '\r')
          done

          if [ "$errors" -gt 0 ]; then
            echo "$errors SPEC.md heading slug error(s) found"
            exit 1
          fi

          echo "All SPEC.md headings have §spec: slugs"

      - name: Validate ROADMAP.md heading slugs
        run: |
          errors=0
          for roadmapfile in $(find . -name 'ROADMAP.md' -not -path './.git/*' | sort); do
            echo "Checking $roadmapfile"
            while IFS= read -r line; do
              if ! echo "$line" | grep -qE '^### §road:[a-z0-9-]+'; then
                echo "::error file=${roadmapfile}::Heading missing §road: slug pattern: $line"
                errors=$((errors + 1))
              fi
            done < <(grep -E '^### ' "$roadmapfile" | tr -d '\r')
          done

          if [ "$errors" -gt 0 ]; then
            echo "$errors ROADMAP.md heading slug error(s) found"
            exit 1
          fi

          echo "All ROADMAP.md headings have §road: slugs"

      - name: Validate REQUIREMENTS.md heading slugs
        run: |
          errors=0
          for reqfile in $(find . -name 'REQUIREMENTS.md' -not -path './.git/*' | sort); do
            echo "Checking $reqfile"
            while IFS= read -r line; do
              if ! echo "$line" | grep -qE '§req:[a-z0-9-]+'; then
                echo "::error file=${reqfile}::Heading missing §req: slug: $line"
                errors=$((errors + 1))
              fi
            done < <(grep -E '^## ' "$reqfile" | tr -d '\r')
          done

          if [ "$errors" -gt 0 ]; then
            echo "$errors REQUIREMENTS.md heading slug error(s) found"
            exit 1
          fi

          echo "All REQUIREMENTS.md headings have §req: slugs"

      - name: Validate CHANGELOG.md structure
        run: |
          errors=0
          for changelog in $(find . -name 'CHANGELOG.md' -not -path './.git/*' | sort); do
            echo "Checking $changelog"

            # Must have an [Unreleased] section
            if ! grep -qE '^## \[Unreleased\]' "$changelog"; then
              echo "::error file=${changelog}::Missing ## [Unreleased] section"
              errors=$((errors + 1))
            fi

            # Every ## heading must match [Unreleased] or [N.N.N] (with optional link)
            while IFS= read -r line; do
              if ! echo "$line" | grep -qE '^## \[(Unreleased|[0-9]+\.[0-9]+\.[0-9]+)\]'; then
                echo "::error file=${changelog}::Invalid version heading: $line"
                errors=$((errors + 1))
              fi
            done < <(grep -E '^## ' "$changelog" | tr -d '\r')
          done

          if [ "$errors" -gt 0 ]; then
            echo "$errors CHANGELOG.md structure error(s) found"
            exit 1
          fi

          echo "All CHANGELOG.md files have valid structure"

      - name: Validate cross-document references
        run: |
          errors=0
          slugs_file=$(mktemp)

          # Extract §prefix:slug from heading lines across all governance roots.
          # §spec: from ## headings in all SPEC.md files
          for f in $(find . -name 'SPEC.md' -not -path './.git/*'); do
            grep -E '^## ' "$f" | grep -oE '§spec:[a-z0-9-]+' >> "$slugs_file" || true
          done

          # §road: from ### headings in all ROADMAP.md files
          for f in $(find . -name 'ROADMAP.md' -not -path './.git/*'); do
            grep -E '^### ' "$f" | grep -oE '§road:[a-z0-9-]+' >> "$slugs_file" || true
          done

          # §req: from ## headings in all REQUIREMENTS.md files
          for f in $(find . -name 'REQUIREMENTS.md' -not -path './.git/*'); do
            grep -E '^## ' "$f" | grep -oE '§req:[a-z0-9-]+' >> "$slugs_file" || true
          done

          echo "Defined slugs:"
          cat "$slugs_file"

          # Scan governance files for references and validate them
          govfiles=$(find . -name 'SPEC.md' -o -name 'ROADMAP.md' -o -name 'CONVENTIONS.md' -o -name 'REQUIREMENTS.md' | grep -v './.git/' | sort)
          for govfile in $govfiles; do

            lineno=0
            in_fenced_block=false
            while IFS= read -r line; do
              lineno=$((lineno + 1))

              # Track fenced code blocks
              if echo "$line" | grep -qE '^```'; then
                if $in_fenced_block; then
                  in_fenced_block=false
                else
                  in_fenced_block=true
                fi
                continue
              fi

              # Skip lines inside fenced code blocks
              if $in_fenced_block; then
                continue
              fi

              # Strip inline code spans before scanning for references
              stripped=$(echo "$line" | sed 's/`[^`]*`//g')

              # Find all §prefix:slug references on the stripped line
              refs=$(echo "$stripped" | grep -oE '§(spec|req|road):[a-z0-9-]+' || true)
              if [ -z "$refs" ]; then
                continue
              fi

              for ref in $refs; do
                prefix="${ref%%:*}"
                prefix="${prefix#§}"

                # Skip heading definitions (not references)
                basename=$(basename "$govfile")
                case "$prefix" in
                  spec)
                    if [ "$basename" = "SPEC.md" ] && echo "$line" | grep -q '^## '; then
                      continue
                    fi ;;
                  road)
                    if [ "$basename" = "ROADMAP.md" ] && echo "$line" | grep -q '^### '; then
                      continue
                    fi ;;
                  req)
                    if [ "$basename" = "REQUIREMENTS.md" ] && echo "$line" | grep -q '^## '; then
                      continue
                    fi ;;
                esac

                # Check that the reference resolves to a defined slug
                if ! grep -qxF "$ref" "$slugs_file"; then
                  echo "::error file=${govfile},line=${lineno}::Dangling reference ${ref} — no matching heading found"
                  errors=$((errors + 1))
                fi
              done
            done < <(tr -d '\r' < "$govfile")
          done

          rm -f "$slugs_file"

          if [ "$errors" -gt 0 ]; then
            echo "$errors cross-document reference error(s) found"
            exit 1
          fi

          echo "All cross-document references resolved"
